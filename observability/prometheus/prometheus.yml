global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: reservation-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - reservation-service:8000

  - job_name: notification-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - notification-worker:8100

  - job_name: mock-pms
    metrics_path: /metrics
    static_configs:
      - targets:
          - mock-pms:9000

