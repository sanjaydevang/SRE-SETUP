apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: crs-lab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crs-lab-fluent-bit
rules:
  - apiGroups: [""]
    resources:
      - pods
      - namespaces
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crs-lab-fluent-bit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crs-lab-fluent-bit
subjects:
  - kind: ServiceAccount
    name: fluent-bit
    namespace: crs-lab
---
apiVersion: v1
kind: Secret
metadata:
  name: splunk-hec-secret
  namespace: crs-lab
type: Opaque
stringData:
  SPLUNK_HEC_TOKEN: replace-with-your-token
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: crs-lab
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Parsers_File  parsers.conf

    [INPUT]
        Name              tail
        Path              /var/log/containers/*crs-lab*.log
        Tag               kube.*
        Parser            cri
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off

    [OUTPUT]
        Name            splunk
        Match           kube.*
        Host            ${SPLUNK_HEC_HOST}
        Port            ${SPLUNK_HEC_PORT}
        Splunk_Token    ${SPLUNK_HEC_TOKEN}
        TLS             On
        TLS.Verify      Off
        Splunk_Send_Raw Off
        Event_Index     crs_lab
        Event_Source    kubernetes
        Event_Sourcetype crs:json

  parsers.conf: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit-splunk
  namespace: crs-lab
spec:
  selector:
    matchLabels:
      app: fluent-bit-splunk
  template:
    metadata:
      labels:
        app: fluent-bit-splunk
    spec:
      serviceAccountName: fluent-bit
      tolerations:
        - operator: Exists
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:3.2.10
          env:
            - name: SPLUNK_HEC_HOST
              value: splunk.example.com
            - name: SPLUNK_HEC_PORT
              value: "8088"
            - name: SPLUNK_HEC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: splunk-hec-secret
                  key: SPLUNK_HEC_TOKEN
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: config
              mountPath: /fluent-bit/etc
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: config
          configMap:
            name: fluent-bit-config

