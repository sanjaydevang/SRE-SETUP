apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: crs-lab
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: crs-lab
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: CRS SRE Lab
        orgId: 1
        folder: CRS SRE Lab
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-crs-dashboard
  namespace: crs-lab
data:
  crs-overview.json: |
    {
      "editable": true,
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}, "overrides": []},
          "gridPos": {"h": 8, "w": 6, "x": 0, "y": 0},
          "id": 1,
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "textMode": "auto"},
          "targets": [{"expr": "sum(crs_reservations_created_total)", "legendFormat": "reservations", "refId": "A"}],
          "title": "Reservations Created",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}, "overrides": []},
          "gridPos": {"h": 8, "w": 6, "x": 6, "y": 0},
          "id": 2,
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "textMode": "auto"},
          "targets": [{"expr": "sum(crs_dlq_messages_total)", "legendFormat": "dlq", "refId": "A"}],
          "title": "DLQ Messages",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "fieldConfig": {"defaults": {"custom": {"drawStyle": "line", "lineInterpolation": "linear", "lineWidth": 2, "fillOpacity": 8, "showPoints": "never", "stacking": {"mode": "none", "group": "A"}, "axisPlacement": "auto"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}, "overrides": []},
          "gridPos": {"h": 9, "w": 12, "x": 0, "y": 8},
          "id": 3,
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}},
          "targets": [{"expr": "sum(rate(crs_reservations_created_total[1m]))", "legendFormat": "reservation rate", "refId": "A"}],
          "title": "Reservation Rate",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "fieldConfig": {"defaults": {"custom": {"drawStyle": "line", "lineInterpolation": "linear", "lineWidth": 2, "fillOpacity": 8, "showPoints": "never", "stacking": {"mode": "none", "group": "A"}, "axisPlacement": "auto"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}, "overrides": []},
          "gridPos": {"h": 9, "w": 12, "x": 12, "y": 8},
          "id": 4,
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}},
          "targets": [
            {"expr": "sum(rate(crs_pms_delivery_success_total[1m]))", "legendFormat": "pms success rate", "refId": "A"},
            {"expr": "sum(rate(crs_pms_delivery_failure_total[1m]))", "legendFormat": "pms failure rate", "refId": "B"}
          ],
          "title": "PMS Delivery Rate",
          "type": "timeseries"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 40,
      "tags": ["sre", "crs"],
      "time": {"from": "now-15m", "to": "now"},
      "timezone": "browser",
      "title": "CRS SRE Overview",
      "uid": "crs-sre-overview",
      "version": 1
    }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: crs-lab
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: crs-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-crs-dashboard
              mountPath: /var/lib/grafana/dashboards
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: grafana-crs-dashboard
          configMap:
            name: grafana-crs-dashboard
