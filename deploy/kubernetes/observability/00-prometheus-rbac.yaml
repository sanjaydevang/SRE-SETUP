apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: crs-lab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crs-lab-prometheus
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crs-lab-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crs-lab-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: crs-lab

