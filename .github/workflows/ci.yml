name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/reservation_service/requirements.txt
          pip install -r services/mock_pms/requirements.txt
          pip install pytest
      - name: Run unit tests
        run: pytest -q

